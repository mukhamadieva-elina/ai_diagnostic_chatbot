services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1"
      POSTGRES_DB: ai_diagnostic_chatbot
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_data.sql:/docker-entrypoint-initdb.d/init_data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_diagnostic_chatbot"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "80:8000"
    env_file: .env
    environment:
      # Переопределяем URL: localhost → имя сервиса db внутри Docker
      DATABASE_URL: postgresql+asyncpg://postgres:1@db:5432/ai_diagnostic_chatbot
      REPORTS_DIR: /project/reports
    volumes:
      - ./reports:/project/reports
    depends_on:
      db:
        condition: service_healthy

  prometheus:
    profiles: [monitoring]
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - app
    restart: unless-stopped

  grafana:
    profiles: [monitoring]
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ALERTING_ENABLED: "true"
      GF_UNIFIED_ALERTING_ENABLED: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data: