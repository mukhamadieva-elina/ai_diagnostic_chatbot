<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AI Booster — Диагностика бизнеса</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      min-height: 100dvh;
    }

    .chat-wrapper {
      width: 100%;
      max-width: 680px;
      height: 100vh;
      height: 100dvh;
      max-height: 800px;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
      overflow: hidden;
    }

    @media (max-width: 600px) {
      body {
        background: #fff;
        align-items: stretch;
      }
      .chat-wrapper {
        max-width: 100%;
        max-height: none;
        border-radius: 0;
        box-shadow: none;
      }
    }

    /* Header */
    .chat-header {
      background: #1A3C6E;
      color: #fff;
      padding: 18px 24px;
      padding-top: max(18px, env(safe-area-inset-top));
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .chat-header .logo {
      width: 38px;
      height: 38px;
      background: #2196F3;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
    }
    .chat-header h1 { font-size: 17px; font-weight: 600; }
    .chat-header p  { font-size: 12px; opacity: 0.7; margin-top: 2px; }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      max-width: 85%;
      animation: fadeIn 0.2s ease;
    }
    .msg.bot  { align-self: flex-start; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }

    .msg .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #1A3C6E;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .msg.user .avatar { background: #2196F3; }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 12px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.bot  .bubble { background: #f0f2f5; color: #1a1a1a; border-bottom-left-radius: 4px; }
    .msg.user .bubble { background: #1A3C6E; color: #fff; border-bottom-right-radius: 4px; }

    /* Report button inside bubble */
    .report-btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 16px;
      background: #2196F3;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .report-btn:hover { background: #1976D2; }

    /* Typing indicator */
    .typing {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      align-self: flex-start;
    }
    .typing .avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: #1A3C6E; color: #fff;
      font-size: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .dots {
      background: #f0f2f5;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      padding: 12px 16px;
      display: flex;
      gap: 4px;
    }
    .dots span {
      width: 7px; height: 7px;
      background: #999;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    /* Generating indicator */
    .generating-badge {
      align-self: center;
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      color: #856404;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .generating-badge .spinner {
      width: 12px; height: 12px;
      border: 2px solid #ffc107;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* Input area */
    .input-area {
      padding: 14px 16px;
      padding-bottom: max(14px, env(safe-area-inset-bottom));
      border-top: 1px solid #eee;
      display: flex;
      gap: 10px;
      flex-shrink: 0;
      background: #fff;
    }
    textarea {
      flex: 1;
      border: 1.5px solid #ddd;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 12px;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.4;
      max-height: 120px;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #2196F3; }
    textarea:disabled { background: #f9f9f9; color: #aaa; }

    button#send-btn {
      width: 44px; height: 44px;
      border-radius: 12px;
      border: none;
      background: #1A3C6E;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, opacity 0.2s;
      align-self: flex-end;
    }
    button#send-btn:hover:not(:disabled) { background: #2196F3; }
    button#send-btn:disabled { opacity: 0.4; cursor: default; }
    button#send-btn svg { pointer-events: none; }

    /* New chat button */
    .new-chat-btn {
      margin-left: auto;
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .new-chat-btn:hover { background: rgba(255,255,255,0.25); }

    /* Inline contact form */
    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
      white-space: normal;
    }
    .contact-form-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .contact-form-field label {
      font-size: 11px;
      font-weight: 600;
      color: #555;
    }
    .contact-form-field input {
      border: 1.5px solid #d0d0d0;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      background: #fff;
      transition: border-color 0.2s;
    }
    .contact-form-field input:focus { border-color: #2196F3; }
    .contact-form-field input.invalid { border-color: #e53935; }
    .contact-form .field-error {
      font-size: 11px;
      color: #e53935;
      display: none;
    }
    .contact-form .field-error.visible { display: block; }
    .consent-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-top: 2px;
    }
    .consent-row input[type="checkbox"] {
      margin-top: 2px;
      flex-shrink: 0;
      width: 15px;
      height: 15px;
      cursor: pointer;
      accent-color: #1A3C6E;
    }
    .consent-row label {
      font-size: 11px;
      color: #777;
      line-height: 1.4;
      cursor: pointer;
    }
    .contact-form-submit {
      padding: 9px;
      background: #1A3C6E;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 2px;
      transition: background 0.2s;
    }
    .contact-form-submit:hover:not(:disabled) { background: #2196F3; }
    .contact-form-submit:disabled { opacity: 0.5; cursor: default; }

    /* Кнопки выбора сценария */
    .scenario-options {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 10px;
    }
    .scenario-btn {
      background: #fff;
      border: 1.5px solid #1A3C6E;
      color: #1A3C6E;
      border-radius: 10px;
      padding: 9px 14px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, color 0.15s;
      line-height: 1.3;
    }
    .scenario-btn:hover { background: #1A3C6E; color: #fff; }
    .scenario-btn:disabled { opacity: 0.4; cursor: default; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* iframe-режим: убираем серый фон и центрирование, растягиваем на весь iframe */
    html.embedded body {
      background: #fff;
      display: block;
      height: 100%;
      overflow: hidden;
    }
    html.embedded .chat-wrapper {
      width: 100%;
      max-width: 100%;
      height: 100%;
      max-height: 100%;
      border-radius: 0;
      box-shadow: none;
    }
    html.embedded .chat-header { display: none; }

    @media (max-width: 600px) {
      .chat-header { padding: 14px 16px; padding-top: max(14px, env(safe-area-inset-top)); }
      .chat-header h1 { font-size: 15px; }
      .chat-header p  { font-size: 11px; }
      .chat-header .logo { width: 32px; height: 32px; font-size: 14px; }

      .messages { padding: 14px 12px; gap: 10px; }

      .msg { max-width: 92%; }
      .bubble { font-size: 15px; padding: 9px 13px; }

      .input-area { padding: 10px 12px; padding-bottom: max(10px, env(safe-area-inset-bottom)); gap: 8px; }
      textarea { font-size: 16px; /* предотвращает zoom на iOS */ padding: 9px 12px; }

      button#send-btn { width: 44px; height: 44px; }

      .scenario-btn { font-size: 15px; padding: 11px 14px; }

      .contact-form-field input { font-size: 16px; /* предотвращает zoom на iOS */ padding: 10px 12px; }
      .contact-form-submit { padding: 12px; font-size: 15px; }

      .new-chat-btn { padding: 6px 10px; font-size: 11px; }
    }
  </style>
</head>
<body>
<script>if (window.self !== window.top) document.documentElement.classList.add('embedded');</script>
<div class="chat-wrapper">

  <div class="chat-header">
    <div class="logo">AI</div>
    <div>
      <h1>AI Booster</h1>
      <p>AI Диагностика бизнеса</p>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <textarea
      id="input"
      rows="1"
      placeholder="Введите сообщение..."
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button id="send-btn" onclick="sendMessage()" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
  const API = '';  // пустая строка = тот же хост
  let sessionId = null;
  let polling = null;

  // ── Контактная форма (inline) ────────────────────────────────────
  function addContactForm() {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.id = 'contact-form-msg';
    div.innerHTML = `
      <div class="avatar">AI</div>
      <div class="bubble">Укажите ваши контактные данные:
        <form class="contact-form" onsubmit="submitContacts(event)">
          <div class="contact-form-field">
            <label>Имя</label>
            <input type="text" id="contact-name" placeholder="Иван Иванов" />
          </div>
          <div class="contact-form-field">
            <label>Email</label>
            <input type="email" id="contact-email" placeholder="ivan@example.com" />
            <div class="field-error" id="email-error">Введите корректный email</div>
          </div>
          <div class="contact-form-field">
            <label>Телефон</label>
            <input type="tel" id="contact-phone" placeholder="+7 (900) 000-00-00" />
            <div class="field-error" id="phone-error">Введите номер полностью</div>
          </div>
          <div class="consent-row">
            <input type="checkbox" id="consent-checkbox" onchange="toggleSubmitBtn()" />
            <label for="consent-checkbox">
              Отправляя форму, я даю согласие на обработку персональных данных
            </label>
          </div>
          <button type="submit" class="contact-form-submit" id="contacts-submit" disabled>Получить отчёт</button>
        </form>
      </div>`;
    msgs.appendChild(div);
    scrollBottom();
    document.getElementById('contact-name').focus();
    applyPhoneMask(document.getElementById('contact-phone'), document.getElementById('phone-error'));
    applyEmailMask(document.getElementById('contact-email'), document.getElementById('email-error'));
  }

  function toggleSubmitBtn() {
    const checked = document.getElementById('consent-checkbox')?.checked;
    const btn = document.getElementById('contacts-submit');
    if (btn) btn.disabled = !checked;
  }

  function validateEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim());
  }

  function validatePhone(phone) {
    return phone.replace(/\D/g, '').length === 11;
  }

  function applyPhoneMask(input, errorEl) {
    function format(raw) {
      let digits = raw.replace(/\D/g, '');
      if (digits.startsWith('8') || digits.startsWith('7')) digits = digits.slice(1);
      digits = digits.slice(0, 10);
      let r = '+7';
      if (digits.length > 0) r += ' (' + digits.slice(0, 3);
      if (digits.length >= 3) r += ') ' + digits.slice(3, 6);
      if (digits.length >= 6) r += '-' + digits.slice(6, 8);
      if (digits.length >= 8) r += '-' + digits.slice(8, 10);
      return r;
    }
    input.addEventListener('focus', function () {
      if (!this.value) this.value = '+7 (';
    });
    input.addEventListener('blur', function () {
      if (this.value === '+7 (' || this.value === '+7') this.value = '';
      if (this.value && !validatePhone(this.value)) {
        this.classList.add('invalid');
        errorEl.classList.add('visible');
      }
    });
    input.addEventListener('input', function () {
      const pos = this.selectionStart;
      const before = this.value.slice(0, pos).replace(/\D/g, '').length;
      this.value = format(this.value);
      // восстанавливаем позицию курсора
      let count = 0, newPos = this.value.length;
      for (let i = 0; i < this.value.length; i++) {
        if (/\d/.test(this.value[i])) count++;
        if (count === before) { newPos = i + 1; break; }
      }
      this.setSelectionRange(newPos, newPos);
      if (validatePhone(this.value)) {
        this.classList.remove('invalid');
        errorEl.classList.remove('visible');
      }
    });
    input.addEventListener('keydown', function (e) {
      if (e.key === 'Backspace' && (this.value === '+7 (' || this.value === '+7')) {
        e.preventDefault();
        this.value = '';
      }
    });
  }

  function applyEmailMask(input, errorEl) {
    input.addEventListener('blur', function () {
      if (this.value.trim() && !validateEmail(this.value)) {
        this.classList.add('invalid');
        errorEl.classList.add('visible');
      }
    });
    input.addEventListener('input', function () {
      if (validateEmail(this.value)) {
        this.classList.remove('invalid');
        errorEl.classList.remove('visible');
      }
    });
  }

  async function submitContacts(e) {
    e.preventDefault();
    const name  = document.getElementById('contact-name').value.trim();
    const email = document.getElementById('contact-email').value.trim();
    const phone = document.getElementById('contact-phone').value.trim();

    const emailInput = document.getElementById('contact-email');
    const emailError = document.getElementById('email-error');
    const phoneInput = document.getElementById('contact-phone');
    const phoneError = document.getElementById('phone-error');

    const consent = document.getElementById('consent-checkbox').checked;

    let valid = true;
    if (!validateEmail(email)) {
      emailInput.classList.add('invalid');
      emailError.classList.add('visible');
      valid = false;
    } else {
      emailInput.classList.remove('invalid');
      emailError.classList.remove('visible');
    }
    if (!validatePhone(phone)) {
      phoneInput.classList.add('invalid');
      phoneError.classList.add('visible');
      valid = false;
    } else {
      phoneInput.classList.remove('invalid');
      phoneError.classList.remove('visible');
    }
    if (!name) valid = false;
    if (!consent) valid = false;
    if (!valid) return;

    const btn = document.getElementById('contacts-submit');
    btn.disabled = true;
    btn.textContent = 'Отправляем...';

    try {
      const res = await fetch(`${API}/api/v1/chat/contacts`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId, name, email, phone, timezone: Intl.DateTimeFormat().resolvedOptions().timeZone }),
      });
      const data = await res.json();
      document.getElementById('contact-form-msg')?.remove();

      if (data.status === 'generating') {
        addBotMessage(data.message);
        showGeneratingBadge();
        startPolling();
      } else if (data.status === 'completed') {
        addBotMessage(data.message, data.report_url);
      } else {
        addBotMessage(data.message);
        setInputEnabled(true);
      }
    } catch (e) {
      addBotMessage('Ошибка при отправке данных. Попробуйте ещё раз.');
      btn.disabled = false;
      btn.textContent = 'Получить отчёт';
      setInputEnabled(true);
    }
  }

  // ── Инициализация ──────────────────────────────────────────────
  async function startNewChat() {
    clearPolling();
    document.getElementById('messages').innerHTML = '';
    sessionId = null;
    setInputEnabled(false);

    showTyping();
    try {
      const res = await fetch(`${API}/api/v1/chat/start`, { method: 'POST' });
      const data = await res.json();
      sessionId = data.session_id;
      removeTyping();
      // Показываем только приветствие без нумерованного списка — он заменён кнопками
      const greeting = data.message.split('\n\n')[0];
      addBotMessageWithScenarios(greeting, data.scenarios || []);
      setInputEnabled(true);
    } catch (e) {
      removeTyping();
      addBotMessage('Не удалось подключиться к серверу. Попробуйте обновить страницу.');
    }
  }

  // ── Отправка сообщения ──────────────────────────────────────────
  function selectScenario(name) {
    // Убираем все кнопки и отправляем выбор
    document.querySelectorAll('.scenario-options').forEach(el => el.remove());
    sendText(name);
  }

  async function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text || !sessionId) return;
    input.value = '';
    autoResize(input);
    await sendText(text);
  }

  async function sendText(text) {
    if (!text || !sessionId) return;
    setInputEnabled(false);
    addUserMessage(text);
    showTyping();

    try {
      const res = await fetch(`${API}/api/v1/chat/reply`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId, message: text }),
      });
      const data = await res.json();
      removeTyping();

      if (data.status === 'collecting_contacts') {
        addContactForm();
      } else if (data.status === 'generating') {
        addBotMessage(data.message);
        showGeneratingBadge();
        startPolling();
      } else if (data.status === 'completed') {
        addBotMessage(data.message, data.report_url);
      } else if (data.status === 'error') {
        addBotMessage(data.message);
        setInputEnabled(true);
      } else {
        addBotMessage(data.message);
        setInputEnabled(true);
      }
    } catch (e) {
      removeTyping();
      addBotMessage('Ошибка соединения. Попробуйте ещё раз.');
      setInputEnabled(true);
    }
  }

  // ── Поллинг статуса генерации ───────────────────────────────────
  function startPolling() {
    polling = setInterval(async () => {
      try {
        const res = await fetch(`${API}/api/v1/chat/session/${sessionId}`);
        const data = await res.json();

        if (data.status === 'completed') {
          clearPolling();
          removeGeneratingBadge();
          addBotMessage(
            'Отчёт готов! Вы можете скачать его по ссылке ниже. Спасибо за прохождение диагностики!',
            data.report_url,
          );
        } else if (data.status === 'error') {
          clearPolling();
          removeGeneratingBadge();
          addBotMessage('Произошла ошибка при генерации отчёта. Начните новый диалог.');
        }
      } catch (_) {}
    }, 3000);
  }

  function clearPolling() {
    if (polling) { clearInterval(polling); polling = null; }
  }

  // ── UI-хелперы ──────────────────────────────────────────────────
  function addBotMessage(text, reportUrl) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.innerHTML = `
      <div class="avatar">AI</div>
      <div class="bubble">${escapeHtml(text)}${reportUrl ? `<br><a class="report-btn" href="${reportUrl}" target="_blank" download>📄 Скачать отчёт PDF</a>` : ''}</div>`;
    msgs.appendChild(div);
    scrollBottom();
  }

  function addBotMessageWithScenarios(text, scenarios) {
    const msgs = document.getElementById('messages');

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    const optionsDiv = document.createElement('div');
    optionsDiv.className = 'scenario-options';
    scenarios.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'scenario-btn';
      btn.textContent = s.name;
      btn.addEventListener('click', () => selectScenario(s.name));
      optionsDiv.appendChild(btn);
    });
    bubble.appendChild(optionsDiv);

    const div = document.createElement('div');
    div.className = 'msg bot';
    div.appendChild(avatar);
    div.appendChild(bubble);
    msgs.appendChild(div);
    scrollBottom();
  }

  function addUserMessage(text) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg user';
    div.innerHTML = `<div class="avatar">Я</div><div class="bubble">${escapeHtml(text)}</div>`;
    msgs.appendChild(div);
    scrollBottom();
  }

  function showTyping() {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typing';
    div.innerHTML = `<div class="avatar">AI</div><div class="dots"><span></span><span></span><span></span></div>`;
    msgs.appendChild(div);
    scrollBottom();
  }

  function removeTyping() {
    document.getElementById('typing')?.remove();
  }

  function showGeneratingBadge() {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'generating-badge';
    div.id = 'generating-badge';
    div.innerHTML = `<div class="spinner"></div> Генерирую отчёт...`;
    msgs.appendChild(div);
    scrollBottom();
  }

  function removeGeneratingBadge() {
    document.getElementById('generating-badge')?.remove();
  }

  function setInputEnabled(enabled) {
    const input = document.getElementById('input');
    const btn = document.getElementById('send-btn');
    input.disabled = !enabled;
    btn.disabled = !enabled;
    if (enabled) input.focus();
  }

  function scrollBottom() {
    const msgs = document.getElementById('messages');
    msgs.scrollTop = msgs.scrollHeight;
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/\n/g, '<br>');
  }

  // Старт
  startNewChat();
</script>
</body>
</html>
