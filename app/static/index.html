<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Booster — Диагностика бизнеса</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .chat-wrapper {
      width: 100%;
      max-width: 680px;
      height: 100vh;
      max-height: 800px;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
      overflow: hidden;
    }

    /* Header */
    .chat-header {
      background: #1A3C6E;
      color: #fff;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .chat-header .logo {
      width: 38px;
      height: 38px;
      background: #2196F3;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
    }
    .chat-header h1 { font-size: 17px; font-weight: 600; }
    .chat-header p  { font-size: 12px; opacity: 0.7; margin-top: 2px; }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      max-width: 85%;
      animation: fadeIn 0.2s ease;
    }
    .msg.bot  { align-self: flex-start; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }

    .msg .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #1A3C6E;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .msg.user .avatar { background: #2196F3; }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.bot  .bubble { background: #f0f2f5; color: #1a1a1a; border-bottom-left-radius: 4px; }
    .msg.user .bubble { background: #1A3C6E; color: #fff; border-bottom-right-radius: 4px; }

    /* Report button inside bubble */
    .report-btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 16px;
      background: #2196F3;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .report-btn:hover { background: #1976D2; }

    /* Typing indicator */
    .typing {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      align-self: flex-start;
    }
    .typing .avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: #1A3C6E; color: #fff;
      font-size: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .dots {
      background: #f0f2f5;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      padding: 12px 16px;
      display: flex;
      gap: 4px;
    }
    .dots span {
      width: 7px; height: 7px;
      background: #999;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    /* Generating indicator */
    .generating-badge {
      align-self: center;
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      color: #856404;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .generating-badge .spinner {
      width: 12px; height: 12px;
      border: 2px solid #ffc107;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* Input area */
    .input-area {
      padding: 14px 16px;
      border-top: 1px solid #eee;
      display: flex;
      gap: 10px;
      flex-shrink: 0;
      background: #fff;
    }
    textarea {
      flex: 1;
      border: 1.5px solid #ddd;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.4;
      max-height: 120px;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #2196F3; }
    textarea:disabled { background: #f9f9f9; color: #aaa; }

    button#send-btn {
      width: 44px; height: 44px;
      border-radius: 12px;
      border: none;
      background: #1A3C6E;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, opacity 0.2s;
      align-self: flex-end;
    }
    button#send-btn:hover:not(:disabled) { background: #2196F3; }
    button#send-btn:disabled { opacity: 0.4; cursor: default; }
    button#send-btn svg { pointer-events: none; }

    /* New chat button */
    .new-chat-btn {
      margin-left: auto;
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .new-chat-btn:hover { background: rgba(255,255,255,0.25); }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="chat-wrapper">
  <div class="chat-header">
    <div class="logo">AI</div>
    <div>
      <h1>AI Booster</h1>
      <p>Диагностика бизнес-проблем</p>
    </div>
    <button class="new-chat-btn" onclick="startNewChat()">Новый диалог</button>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <textarea
      id="input"
      rows="1"
      placeholder="Введите сообщение..."
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button id="send-btn" onclick="sendMessage()" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
  const API = '';  // пустая строка = тот же хост
  let sessionId = null;
  let polling = null;

  // ── Инициализация ──────────────────────────────────────────────
  async function startNewChat() {
    clearPolling();
    document.getElementById('messages').innerHTML = '';
    sessionId = null;
    setInputEnabled(false);

    showTyping();
    try {
      const res = await fetch(`${API}/api/v1/chat/start`, { method: 'POST' });
      const data = await res.json();
      sessionId = data.session_id;
      removeTyping();
      addBotMessage(data.message);
      setInputEnabled(true);
    } catch (e) {
      removeTyping();
      addBotMessage('Не удалось подключиться к серверу. Попробуйте обновить страницу.');
    }
  }

  // ── Отправка сообщения ──────────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text || !sessionId) return;

    input.value = '';
    autoResize(input);
    setInputEnabled(false);
    addUserMessage(text);
    showTyping();

    try {
      const res = await fetch(`${API}/api/v1/chat/reply`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId, message: text }),
      });
      const data = await res.json();
      removeTyping();

      if (data.status === 'generating') {
        addBotMessage(data.message);
        showGeneratingBadge();
        startPolling();
      } else if (data.status === 'completed') {
        addBotMessage(data.message, data.report_url);
      } else if (data.status === 'error') {
        addBotMessage(data.message);
        setInputEnabled(true);
      } else {
        addBotMessage(data.message);
        setInputEnabled(true);
      }
    } catch (e) {
      removeTyping();
      addBotMessage('Ошибка соединения. Попробуйте ещё раз.');
      setInputEnabled(true);
    }
  }

  // ── Поллинг статуса генерации ───────────────────────────────────
  function startPolling() {
    polling = setInterval(async () => {
      try {
        const res = await fetch(`${API}/api/v1/chat/session/${sessionId}`);
        const data = await res.json();

        if (data.status === 'completed') {
          clearPolling();
          removeGeneratingBadge();
          addBotMessage(
            'Отчёт готов! Вы можете скачать его по ссылке ниже. Спасибо за прохождение диагностики!',
            data.report_url,
          );
        } else if (data.status === 'error') {
          clearPolling();
          removeGeneratingBadge();
          addBotMessage('Произошла ошибка при генерации отчёта. Начните новый диалог.');
        }
      } catch (_) {}
    }, 3000);
  }

  function clearPolling() {
    if (polling) { clearInterval(polling); polling = null; }
  }

  // ── UI-хелперы ──────────────────────────────────────────────────
  function addBotMessage(text, reportUrl) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.innerHTML = `
      <div class="avatar">AI</div>
      <div class="bubble">${escapeHtml(text)}${reportUrl ? `<br><a class="report-btn" href="${reportUrl}" target="_blank" download>📄 Скачать отчёт PDF</a>` : ''}</div>`;
    msgs.appendChild(div);
    scrollBottom();
  }

  function addUserMessage(text) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg user';
    div.innerHTML = `<div class="avatar">Я</div><div class="bubble">${escapeHtml(text)}</div>`;
    msgs.appendChild(div);
    scrollBottom();
  }

  function showTyping() {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typing';
    div.innerHTML = `<div class="avatar">AI</div><div class="dots"><span></span><span></span><span></span></div>`;
    msgs.appendChild(div);
    scrollBottom();
  }

  function removeTyping() {
    document.getElementById('typing')?.remove();
  }

  function showGeneratingBadge() {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'generating-badge';
    div.id = 'generating-badge';
    div.innerHTML = `<div class="spinner"></div> Генерирую отчёт...`;
    msgs.appendChild(div);
    scrollBottom();
  }

  function removeGeneratingBadge() {
    document.getElementById('generating-badge')?.remove();
  }

  function setInputEnabled(enabled) {
    const input = document.getElementById('input');
    const btn = document.getElementById('send-btn');
    input.disabled = !enabled;
    btn.disabled = !enabled;
    if (enabled) input.focus();
  }

  function scrollBottom() {
    const msgs = document.getElementById('messages');
    msgs.scrollTop = msgs.scrollHeight;
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/\n/g, '<br>');
  }

  // Старт
  startNewChat();
</script>
</body>
</html>
