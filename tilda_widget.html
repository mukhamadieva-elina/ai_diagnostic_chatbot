<!-- ======================================================
     AI Booster — виджет диагностики для Tilda
     Вставьте этот код в блок T123 (HTML) на любой странице
     Замените YOUR_DOMAIN на адрес вашего сервера
     ====================================================== -->

<style>
  #aib-btn {
    position: fixed;
    bottom: 28px;
    right: 28px;
    z-index: 9998;
    display: flex;
    align-items: center;
    gap: 10px;
    background: #1A3C6E;
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 14px 22px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(26,60,110,0.4);
    transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
  }
  #aib-btn:hover {
    background: #234e8a;
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(35,78,138,0.45);
  }
  #aib-btn svg { flex-shrink: 0; }

  #aib-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: rgba(0,0,0,0.55);
    align-items: center;
    justify-content: center;
    padding: 16px;
    animation: aibFadeIn 0.2s ease;
  }
  #aib-overlay.open { display: flex; }

  #aib-modal {
    position: relative;
    width: 100%;
    max-width: 680px;
    height: min(800px, 90dvh);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    animation: aibSlideUp 0.25s ease;
  }
  #aib-modal iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }
  #aib-close {
    position: absolute;
    top: 12px;
    right: 12px;
    z-index: 10;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: rgba(0,0,0,0.35);
    color: #fff;
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  #aib-close:hover { background: rgba(0,0,0,0.6); }

  @keyframes aibFadeIn  { from { opacity: 0; } to { opacity: 1; } }
  @keyframes aibSlideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 500px) {
    #aib-btn span { display: none; }
    #aib-btn { padding: 14px; border-radius: 50%; }
    #aib-modal { height: 100dvh; max-width: 100%; border-radius: 0; }
    #aib-overlay { padding: 0; }
  }
</style>

<!-- Плавающая кнопка -->
<button id="aib-btn" onclick="document.getElementById('aib-overlay').classList.add('open')">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
  <span>Пройти диагностику</span>
</button>

<!-- Модальное окно с чатом -->
<div id="aib-overlay" onclick="closeAibModal(event)">
  <div id="aib-modal">
    <button id="aib-close" onclick="closeAibModal()" title="Закрыть">&#x2715;</button>
    <iframe
      id="aib-iframe"
      src=""
      title="AI Booster — диагностика бизнеса"
      allow="clipboard-write"
    ></iframe>
  </div>
</div>

<script>
  var AIB_URL = 'https://YOUR_DOMAIN';  // ← замените на адрес вашего сервера

  function closeAibModal(e) {
    if (e && e.target !== document.getElementById('aib-overlay') && e.target !== document.getElementById('aib-close')) return;
    document.getElementById('aib-overlay').classList.remove('open');
  }

  // Загружаем iframe только при первом открытии (не при загрузке страницы)
  document.getElementById('aib-btn').addEventListener('click', function () {
    var iframe = document.getElementById('aib-iframe');
    if (!iframe.src || iframe.src === window.location.href) {
      iframe.src = AIB_URL;
    }
  });

  // Закрытие по Escape
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closeAibModal();
  });
</script>
